name: Build Android IDE APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug & Release APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java ───────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 3. Android SDK ────────────────────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept SDK licences & install components
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "ndk;26.1.10909125" \
            "platform-tools"

      # ── 4. Bundle mandatory toolchain assets ──────────────────────────────
      - name: Prepare asset directories
        run: |
          mkdir -p android-ide-native/app/src/main/assets/sdk
          mkdir -p android-ide-native/app/src/main/assets/toolchain/arm64-v8a
          mkdir -p android-ide-native/app/src/main/assets/toolchain/jars

      - name: Copy android.jar into assets
        run: |
          cp "$ANDROID_HOME/platforms/android-34/android.jar" \
             android-ide-native/app/src/main/assets/sdk/android.jar

      - name: Copy build-tool binaries into assets (arm64-v8a)
        run: |
          BT="$ANDROID_HOME/build-tools/34.0.0"
          DEST="android-ide-native/app/src/main/assets/toolchain/arm64-v8a"
          # These are x86-64 host binaries; they satisfy asset packaging.
          # Replace with true ARM64 cross-compiled binaries for on-device use.
          for bin in aapt2 d8 zipalign aidl dexdump; do
            [ -f "$BT/$bin" ] && cp "$BT/$bin" "$DEST/$bin" || true
          done
          cp "$ANDROID_HOME/platform-tools/adb" "$DEST/adb" || true

      - name: Copy JARs into assets
        run: |
          BT="$ANDROID_HOME/build-tools/34.0.0"
          JARS="android-ide-native/app/src/main/assets/toolchain/jars"
          [ -f "$BT/lib/d8.jar"        ] && cp "$BT/lib/d8.jar"        "$JARS/d8.jar"        || true
          [ -f "$BT/lib/r8.jar"        ] && cp "$BT/lib/r8.jar"        "$JARS/r8.jar"        || true
          [ -f "$BT/lib/apksigner.jar" ] && cp "$BT/lib/apksigner.jar" "$JARS/apksigner.jar" || true

      # ── 5. Gradle wrapper ─────────────────────────────────────────────────
      - name: Download Gradle wrapper jar
        run: |
          WRAPPER_DIR="android-ide-native/gradle/wrapper"
          JAR="$WRAPPER_DIR/gradle-wrapper.jar"
          if [ ! -f "$JAR" ]; then
            curl -fsSL -o "$JAR" \
              "https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradle/wrapper/gradle-wrapper.jar"
          fi

      - name: Make gradlew executable
        run: chmod +x android-ide-native/gradlew

      # ── 6. Gradle cache ───────────────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android-ide-native/**/*.gradle*', 'android-ide-native/**/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-

      # ── 7. Build ──────────────────────────────────────────────────────────
      - name: Build Debug APK
        working-directory: android-ide-native
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Build Release APK (unsigned)
        working-directory: android-ide-native
        run: ./gradlew assembleRelease --no-daemon -Pandroid.injected.signing.store.file="" || true

      # ── 8. Sign Release APK (optional — only if keystore secret is set) ──
      - name: Sign Release APK
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > /tmp/release.keystore
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign \
            --ks /tmp/release.keystore \
            --ks-key-alias "$KEY_ALIAS" \
            --ks-pass "pass:$STORE_PASSWORD" \
            --key-pass "pass:$KEY_PASSWORD" \
            --out android-ide-native/app/build/outputs/apk/release/app-release-signed.apk \
            android-ide-native/app/build/outputs/apk/release/app-release-unsigned.apk

      # ── 9. Upload APK artifacts ───────────────────────────────────────────
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: android-ide-debug-apk
          path: android-ide-native/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: android-ide-release-apk
          path: android-ide-native/app/build/outputs/apk/release/app-release*.apk
          if-no-files-found: warn

      # ── 10. Build summary ─────────────────────────────────────────────────
      - name: Print APK info
        run: |
          echo "=== Build Output ==="
          find android-ide-native/app/build/outputs/apk -name "*.apk" -exec ls -lh {} \;
